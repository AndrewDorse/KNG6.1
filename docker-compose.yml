# KNG6 — strategy-1 streak12_cheap19. Copy .env.example to .env; POLY_DRY_RUN=false when ready.
services:
  kng6:
    build: .
    image: kng6-streak12:local
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    environment:
      POLY_DRY_RUN: "${POLY_DRY_RUN:-true}"
